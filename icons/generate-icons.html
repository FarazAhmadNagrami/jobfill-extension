<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JobFill Icon Generator</title>
<style>
  body { font-family: system-ui; background: #0f0f0f; color: #fff; padding: 24px; }
  canvas { border: 1px solid #333; margin: 10px; }
  button { background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 8px 4px; }
  button:hover { background: #2563eb; }
  .download-area { margin-top: 16px; }
  p { color: #9ca3af; margin-bottom: 16px; }
  h1 { margin-bottom: 8px; }
</style>
</head>
<body>
<h1>⚡ JobFill Icon Generator</h1>
<p>Click "Generate & Download All Icons" to create the required PNG icon files. Then place them in the /icons/ folder.</p>
<div>
  <canvas id="canvas16" width="16" height="16"></canvas>
  <canvas id="canvas48" width="48" height="48"></canvas>
  <canvas id="canvas128" width="128" height="128"></canvas>
</div>
<div class="download-area">
  <button onclick="generateAll()">⬇ Generate & Download All Icons</button>
  <button onclick="drawPreviews()">👁 Preview Icons</button>
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.18; // border radius
  const padding = size * 0.06;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#2563eb');
  grad.addColorStop(1, '#1d4ed8');

  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Draw lightning bolt ⚡
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(255,255,255,0.3)';
  ctx.shadowBlur = size * 0.05;

  // Lightning bolt path (scaled to icon size)
  const s = size;
  ctx.beginPath();
  // Top of bolt
  ctx.moveTo(s * 0.62, s * 0.08);
  ctx.lineTo(s * 0.38, s * 0.52);
  ctx.lineTo(s * 0.55, s * 0.52);
  ctx.lineTo(s * 0.38, s * 0.92);
  ctx.lineTo(s * 0.65, s * 0.44);
  ctx.lineTo(s * 0.47, s * 0.44);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawPreviews() {
  [16, 48, 128].forEach(size => {
    const canvas = document.getElementById(`canvas${size}`);
    drawIcon(canvas, size);
  });
}

function generateAll() {
  drawPreviews();
  [16, 48, 128].forEach(size => {
    const canvas = document.getElementById(`canvas${size}`);
    const link = document.createElement('a');
    link.download = `icon${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

// Auto-preview on load
window.onload = drawPreviews;
</script>
</body>
</html>
